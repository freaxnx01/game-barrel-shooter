      const stick = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.44, 8), dynMatl);
      stick.position.x = s * 0.12; stick.castShadow = true;
      mesh.add(stick);
    }
    const fuse = new THREE.Mesh(fuseGeo, fuseMatl);
    fuse.position.y = 0.26; mesh.add(fuse);
  } else if (type === 'anchor') {
    mesh = new THREE.Group();
    const anchMatl = new THREE.MeshStandardMaterial({ color: '#8a8f98', roughness: 0.4, metalness: 0.85 });
    const shank = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.8, 10), anchMatl);
    shank.castShadow = true; mesh.add(shank);
    const ring = new THREE.Mesh(new THREE.TorusGeometry(0.11, 0.03, 8, 16), anchMatl);
    ring.position.y = 0.46; mesh.add(ring);
    const stock = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.05, 0.05), anchMatl);
    stock.position.y = 0.3; mesh.add(stock);
    const arms = new THREE.Mesh(new THREE.TorusGeometry(0.28, 0.05, 8, 16, Math.PI), anchMatl);
    arms.position.y = -0.4; arms.rotation.z = Math.PI; mesh.add(arms);
  } else if (type === 'crt') {
    // beige CRT monitor: front bezel, domed glass, tapered tube hump, stand foot
    mesh = new THREE.Group();
    const caseMatl = new THREE.MeshStandardMaterial({ color: '#d8d2c2', roughness: 0.8 });
    const bezel = new THREE.Mesh(new THREE.BoxGeometry(0.68, 0.56, 0.22), caseMatl);
    bezel.position.set(0, 0.06, 0.19); bezel.castShadow = true; mesh.add(bezel);
    // slightly bulging glass, inset in the bezel
    const glass = new THREE.Mesh(new THREE.SphereGeometry(1, 20, 14),
      new THREE.MeshStandardMaterial({ color: '#1c2f28', roughness: 0.25, metalness: 0.3 }));
    glass.scale.set(0.26, 0.21, 0.06);
    glass.position.set(0, 0.06, 0.28); mesh.add(glass);
    // rear tube: frustum narrowing toward the back
    const tubeGeo = new THREE.CylinderGeometry(0.36, 0.2, 0.36, 4, 1);
    tubeGeo.rotateY(Math.PI / 4);
    tubeGeo.rotateX(Math.PI / 2);
    const tube = new THREE.Mesh(tubeGeo, caseMatl);
    tube.position.set(0, 0.06, -0.1); tube.castShadow = true; mesh.add(tube);
    // stand: neck + swivel base
    const neck = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.06, 0.2), caseMatl);
    neck.position.set(0, -0.235, 0.05); mesh.add(neck);
    const foot = new THREE.Mesh(new THREE.BoxGeometry(0.44, 0.04, 0.36), caseMatl);
    foot.position.set(0, -0.26, 0.05); foot.castShadow = true; mesh.add(foot);
    // power button on the lower bezel
    const btn = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.03, 0.02),
      new THREE.MeshStandardMaterial({ color: '#6e6a5e', roughness: 0.6 }));
    btn.position.set(0.22, -0.16, 0.3); mesh.add(btn);
  } else if (type === 'harpoon') {
    mesh = new THREE.Group();
    const tipMat = new THREE.MeshStandardMaterial({ color: '#cfd4da', roughness: 0.3, metalness: 0.85 });
    const shaft = new THREE.Mesh(new THREE.CylinderGeometry(SPEAR_R, SPEAR_R, 1.3, 8), tipMat);
    shaft.castShadow = true; mesh.add(shaft);
    const tip = new THREE.Mesh(new THREE.ConeGeometry(0.09, 0.28, 8), tipMat);
    tip.position.y = 0.75; tip.castShadow = true; mesh.add(tip);
    for (const s of [-1, 1]) {
      const barb = new THREE.Mesh(new THREE.ConeGeometry(0.05, 0.16, 6), tipMat);
      barb.position.set(s * 0.08, 0.6, 0); barb.rotation.z = s * 0.9; mesh.add(barb);
    }
  } else if (type === 'sniper') {
    mesh = new THREE.Mesh(ballGeo, new THREE.MeshStandardMaterial({ color: '#c9a94a', roughness: 0.3, metalness: 0.9 }));
    mesh.scale.setScalar(0.14 / BALL_R);
  } else {
    mesh = new THREE.Mesh(ballGeo, bombMatl);
    const fuse = new THREE.Mesh(fuseGeo, fuseMatl);
    fuse.position.y = BALL_R + 0.05;
    mesh.add(fuse);
  }
  mesh.castShadow = true;
  scene.add(mesh);
  const rec = { body, mesh, born: performance.now(), type, exploded: false, constraint, chainMesh, anchorPos };
  // sounds: launch now, clank/bounce on collision
  playShoot(power);
  body.addEventListener('collide', (e) => {
    if (type === 'bomb' && !rec.exploded) { explode(rec); return; }
    if (type === 'dynamite' && !rec.exploded) { explode(rec, 4.5, 150); return; }
    if (type === 'paintball' && !rec.hit) { paintSplat(rec, e); return; }
    if (type === 'harpoon' && !rec.hit) harpoonStick(rec, e);
    if (type === 'spear' || type === 'f16' || type === 'harpoon') rec.hit = true;
    const v = e.contact.getImpactVelocityAlongNormal();
    if (Math.abs(v) < 1.5) return;
    const other = e.body === body ? e.target : e.body;
    if (other.material === cardMat) unfreezeCards();
    else if (other.material === stoneMat) wakeNear(rec.body.position, 2.6 * TSCALE);
    if (other.material === barrelMat) (other._wood ? playWoodKnock : playClank)(Math.abs(v));
    else playBounce(Math.abs(v));
  });
  balls.push(rec);
  shots++;
  updateHud();
}

// ---------- Explosion ----------
const explosions = []; // {mesh, born, particles}
function explode(rec, RADIUS = 3, STRENGTH = 80) {
  rec.exploded = true;
  const p = rec.body.position.clone();
  // radial impulse on all dynamic bodies
  wakeNear(new CANNON.Vec3(p.x, p.y, p.z), RADIUS + 0.5); // only pieces in blast radius react
  for (const body of world.bodies) {
    if (body.mass <= 0 || body === rec.body) continue;
    const d = body.position.vsub(p);
    const dist = Math.max(d.length(), 0.5);
    if (dist > RADIUS) continue;
    d.normalize();
    const falloff = 1 - dist / RADIUS;
    const imp = STRENGTH * falloff;
    body.wakeUp();
    body.applyImpulse(new CANNON.Vec3(d.x * imp, d.y * imp + imp * 0.3, d.z * imp), body.position);
  }
  // remove the projectile — deferred out of the collide/step callback so we
  // never remove a body mid-narrowphase (which corrupts cannon-es' contacts)
  setTimeout(() => {
    world.removeBody(rec.body);
    scene.remove(rec.mesh);
    const i = balls.indexOf(rec);
    if (i >= 0) balls.splice(i, 1);
  }, 0);

  // visual: flash sphere + debris particles
  const flash = new THREE.Mesh(
    new THREE.SphereGeometry(0.4, 16, 12),
    new THREE.MeshBasicMaterial({ color: '#ffb347', transparent: true, opacity: 0.95 })
  );
  flash.position.copy(p);
  scene.add(flash);
  const pGeo = new THREE.BufferGeometry();
  const N = 60;
  const pos = new Float32Array(N * 3), vel = [];
  for (let j = 0; j < N; j++) {
    pos[j * 3] = p.x; pos[j * 3 + 1] = p.y; pos[j * 3 + 2] = p.z;
    const th = Math.random() * Math.PI * 2, ph = Math.acos(Math.random() * 2 - 1);
    const s = 4 + Math.random() * 7;
    vel.push(new THREE.Vector3(Math.sin(ph) * Math.cos(th) * s, Math.cos(ph) * s + 2, Math.sin(ph) * Math.sin(th) * s));
  }
  pGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const pts = new THREE.Points(pGeo, new THREE.PointsMaterial({ color: '#ff8c42', size: 0.12, transparent: true, opacity: 1 }));
  scene.add(pts);
  explosions.push({ flash, pts, vel, born: performance.now() });
  // camera shake
  shake = 0.35;
  playExplosion();
}

// ---------- Paintball: turn hit pieces red + leave a splat ----------
function paintSplat(rec, e) {
  rec.hit = true;
  const other = e.body === rec.body ? e.target : e.body;
  const tgt = barrels.find(b => b.body === other);
  if (tgt) tgt.mesh.traverse(o => { if (o.isMesh) o.material = paintMatl; });
  // splat blob at the impact spot
  const splat = new THREE.Mesh(splatGeo, paintSplatMatl);
  const p = rec.body.position;
  splat.position.set(p.x, p.y, p.z);
  splat.scale.set(1 + Math.random() * 0.5, 0.35, 1 + Math.random() * 0.5);
  splat.rotation.set(Math.random() * 3, Math.random() * 3, Math.random() * 3);
  scene.add(splat);
  paintSplats.push(splat);
  // remove the paintball itself
  world.removeBody(rec.body);
  scene.remove(rec.mesh);
  const i = balls.indexOf(rec);
  if (i >= 0) balls.splice(i, 1);
  playBounce(6);
}

// ---------- Lightning: strike from the sky at the aim point ----------
function strikeLightning() {
  raycaster.setFromCamera(mouseNDC, camera);
  const hits = raycaster.intersectObjects(barrels.map(b => b.mesh), true);
  let point;
  if (hits.length) {
    point = hits[0].point.clone();
  } else {
    const r = raycaster.ray;
    const t = r.direction.y !== 0 ? -r.origin.y / r.direction.y : 30;
    point = r.origin.clone().add(r.direction.clone().multiplyScalar(Math.max(t, 1)));
  }
  const c = new CANNON.Vec3(point.x, point.y, point.z);
  const R = 4 * TSCALE;
  wakeNear(c, R);
  for (const b of barrels) {
    const d = b.body.position.distanceTo(c);
    if (d > R) continue;
    b.body.wakeUp();
    const f = (1 - d / R) * 110;
    b.body.applyImpulse(new CANNON.Vec3((Math.random() - 0.5) * f, f * 0.5, (Math.random() - 0.5) * f), b.body.position);
  }
  spawnBolt(point);
  shake = 0.45;
  playThunder();
}

function spawnBolt(point) {
  const segs = 16, pts = [];
  const topY = point.y + 24;
  for (let i = 0; i <= segs; i++) {
    const f = i / segs;
    const y = topY + (point.y - topY) * f;
    const j = (1 - f) * 1.6;
    pts.push(new THREE.Vector3(point.x + (Math.random() - 0.5) * j, y, point.z + (Math.random() - 0.5) * j));
  }
  pts[pts.length - 1].set(point.x, point.y, point.z);
  const g = new THREE.BufferGeometry().setFromPoints(pts);
  const line = new THREE.Line(g, new THREE.LineBasicMaterial({ color: '#dbeeff', transparent: true, opacity: 1 }));
  scene.add(line);
  const light = new THREE.PointLight('#cfe6ff', 9, 40);
  light.position.set(point.x, point.y + 2, point.z);
  scene.add(light);
  bolts.push({ line, light, born: performance.now() });
}

// ---------- Laser: instant beam along the aim ray ----------
function fireLaser() {
  raycaster.setFromCamera(mouseNDC, camera);
  const ray = raycaster.ray;
  const origin = ray.origin.clone().add(ray.direction.clone().multiplyScalar(1.0));
  const end = ray.origin.clone().add(ray.direction.clone().multiplyScalar(120));
  const dir = new CANNON.Vec3(ray.direction.x, ray.direction.y, ray.direction.z);
  for (const body of world.bodies) {
    if (body.mass <= 0) continue;
    const bp = new THREE.Vector3(body.position.x, body.position.y, body.position.z);
    const t = bp.clone().sub(ray.origin).dot(ray.direction);
    if (t < 0 || t > 120) continue;
    const closest = ray.origin.clone().add(ray.direction.clone().multiplyScalar(t));
    if (bp.distanceTo(closest) > 1.1 * TSCALE) continue;
    body.wakeUp();
    body.applyImpulse(new CANNON.Vec3(dir.x * 60, dir.y * 60 + 12, dir.z * 60), body.position);
  }
  const line = new THREE.Line(new THREE.BufferGeometry().setFromPoints([origin, end]),
    new THREE.LineBasicMaterial({ color: '#ff3b6b', transparent: true, opacity: 1 }));
  scene.add(line);
  const light = new THREE.PointLight('#ff5b7b', 6, 30);
  light.position.copy(origin.clone().add(ray.direction.clone().multiplyScalar(10)));
  scene.add(light);
  bolts.push({ line, light, born: performance.now() });
  shake = 0.25;
}

// ---------- Disruptor: shockwave that scatters barrels from the aim point ----------
function disruptorBlast() {
  raycaster.setFromCamera(mouseNDC, camera);
  const hits = raycaster.intersectObjects(barrels.map(b => b.mesh), true);
  let point;
  if (hits.length) point = hits[0].point.clone();
  else {
    const r = raycaster.ray;
    const t = r.direction.y !== 0 ? -r.origin.y / r.direction.y : 30;
    point = r.origin.clone().add(r.direction.clone().multiplyScalar(Math.max(t, 1)));
  }
  const c = new CANNON.Vec3(point.x, point.y, point.z);
  const R = 6 * TSCALE;
  wakeNear(c, R);
  for (const body of world.bodies) {
    if (body.mass <= 0) continue;
    const d = body.position.vsub(c);
    const dist = Math.max(d.length(), 0.5);
    if (dist > R) continue;
    d.normalize();
    const f = (1 - dist / R) * 130;
    body.wakeUp();
    body.applyImpulse(new CANNON.Vec3(d.x * f, d.y * f * 0.4 + 6, d.z * f), body.position);
  }
  const segs = 40, ringPts = [];
  for (let i = 0; i <= segs; i++) { const a = i / segs * Math.PI * 2; ringPts.push(new THREE.Vector3(point.x + Math.cos(a) * 0.6, point.y + 0.1, point.z + Math.sin(a) * 0.6)); }
  const line = new THREE.Line(new THREE.BufferGeometry().setFromPoints(ringPts),
    new THREE.LineBasicMaterial({ color: '#37d6e0', transparent: true, opacity: 1 }));
  scene.add(line);
  const light = new THREE.PointLight('#37d6e0', 7, 30);
  light.position.set(point.x, point.y + 2, point.z);
  scene.add(light);
  bolts.push({ line, light, born: performance.now() });
  shake = 0.3;
}

// braided hemp-rope texture: two brown strand tones twisting diagonally
let ropeTexCache = null;
function makeRopeTexture() {
  if (ropeTexCache) return ropeTexCache;
  const c = document.createElement('canvas');
  c.width = 64; c.height = 64;
  const g = c.getContext('2d');
  g.fillStyle = '#6e4a22';
  g.fillRect(0, 0, 64, 64);
  // diagonal strands (pattern wraps at the canvas edges)
  for (let i = -6; i < 12; i++) {
    g.strokeStyle = i % 2 ? '#8f6432' : '#553818';
    g.lineWidth = 7;
    g.beginPath();
    g.moveTo(-8, i * 11);
    g.lineTo(72, i * 11 - 40);
    g.stroke();
  }
  // fiber highlights along the strands
  g.strokeStyle = 'rgba(210,170,110,0.35)';
  g.lineWidth = 1.5;
  for (let i = -6; i < 12; i++) {
    g.beginPath();
    g.moveTo(-8, i * 11 - 3);
    g.lineTo(72, i * 11 - 43);
    g.stroke();
  }
  ropeTexCache = new THREE.CanvasTexture(c);
  ropeTexCache.wrapS = ropeTexCache.wrapT = THREE.RepeatWrapping;
  ropeTexCache.colorSpace = THREE.SRGBColorSpace;
  return ropeTexCache;
}

// ---------- Harpoon: embed in the struck barrel; the player then reels it in ----------
function harpoonStick(rec, e) {
  rec.hit = true;
  if (harpoonLink) return;                          // one tether at a time
  const other = e.body === rec.body ? e.target : e.body;
  if (!other || other.mass <= 0 || other.material !== barrelMat) return;  // only bites into barrels
  rec.stuck = true;
  rec.body.velocity.scale(0.15, rec.body.velocity);
  rec.body.angularVelocity.setZero();
  const constraint = new CANNON.LockConstraint(rec.body, other);
  world.addConstraint(constraint);
  // thin braided rope: a unit-height cylinder we reposition/orient/scale every frame
  const rope = new THREE.Mesh(
    new THREE.CylinderGeometry(0.02, 0.02, 1, 8, 1, true),
    new THREE.MeshStandardMaterial({ map: makeRopeTexture(), roughness: 0.95, metalness: 0.0, side: THREE.DoubleSide }));
  scene.add(rope);
  harpoonLink = { rec, barrel: other, constraint, rope };
  playBounce(6);
}

function detachHarpoon() {
  if (!harpoonLink) return;
  world.removeConstraint(harpoonLink.constraint);
  scene.remove(harpoonLink.rope);
  harpoonLink.rope.geometry.dispose();
  harpoonLink.rope.material.dispose();
  if (harpoonLink.rec) harpoonLink.rec.stuck = false;   // let it be culled normally now
  harpoonLink = null;
  pulling = false;
}

// ---------- Hurricane: a wandering tornado at the aim point ----------
function spawnHurricane() {
  raycaster.setFromCamera(mouseNDC, camera);
  const hits = raycaster.intersectObjects(barrels.map(b => b.mesh), true);
  let point;
  if (hits.length) {
    point = hits[0].point.clone();
  } else {
    const r = raycaster.ray;
    const t = r.direction.y !== 0 ? -r.origin.y / r.direction.y : 30;
    point = r.origin.clone().add(r.direction.clone().multiplyScalar(Math.max(t, 1)));
  }
  const S = TSCALE, H = 10 * S;
  const group = new THREE.Group();
  const outerM = new THREE.MeshBasicMaterial({ color: '#a89f90', transparent: true, opacity: 0, side: THREE.DoubleSide, depthWrite: false });
  const outer = new THREE.Mesh(new THREE.ConeGeometry(2.4 * S, H, 24, 6, true), outerM);
  outer.position.y = H / 2; outer.scale.y = -1; // funnel: narrow at the ground
  group.add(outer);
  const innerM = new THREE.MeshBasicMaterial({ color: '#8b8274', transparent: true, opacity: 0, side: THREE.DoubleSide, depthWrite: false });
  const inner = new THREE.Mesh(new THREE.ConeGeometry(1.3 * S, H * 0.82, 20, 5, true), innerM);
  inner.position.y = H * 0.41; inner.scale.y = -1;
  group.add(inner);
  const dustM = new THREE.MeshBasicMaterial({ color: '#9a8f7c', transparent: true, opacity: 0, depthWrite: false });
  const dust = new THREE.Mesh(new THREE.CircleGeometry(1.9 * S, 24), dustM);
  dust.rotation.x = -Math.PI / 2; dust.position.y = 0.06;
  group.add(dust);
  group.position.set(point.x, 0, point.z);
  scene.add(group);
  const a = Math.random() * Math.PI * 2;
  hurricanes.push({
    group, outer, inner, dust,
    born: performance.now(), dur: 6000,
    home: new THREE.Vector2(point.x, point.z),
    vel: new THREE.Vector2(Math.cos(a), Math.sin(a)).multiplyScalar(1.4 * S),
  });
  playWind(6);
}

function playWind(dur) {
  const ac = ctx(), t = ac.currentTime;
  const buf = ac.createBuffer(1, ac.sampleRate * dur, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  const src = ac.createBufferSource(); src.buffer = buf;
  const f = ac.createBiquadFilter(); f.type = 'bandpass'; f.Q.value = 0.6;
  f.frequency.setValueAtTime(240, t);
  f.frequency.linearRampToValueAtTime(700, t + dur * 0.4);
  f.frequency.linearRampToValueAtTime(160, t + dur);
  const g = ac.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.45, t + 0.6);
  g.gain.setValueAtTime(0.45, t + Math.max(dur - 1, 1));
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  src.connect(f).connect(g).connect(ac.destination);
  src.start(t);
}

function playThunder() {
  const ac = ctx(), t = ac.currentTime;
  const dur = 0.7;
  const buf = ac.createBuffer(1, ac.sampleRate * dur, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 2);
  const src = ac.createBufferSource(); src.buffer = buf;
  const f = ac.createBiquadFilter(); f.type = 'lowpass';
  f.frequency.setValueAtTime(1800, t);
  f.frequency.exponentialRampToValueAtTime(120, t + dur);
  const g = ac.createGain();
  g.gain.setValueAtTime(0.8, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  src.connect(f).connect(g).connect(ac.destination);
  src.start(t);
}

function playExplosion() {
  const ac = ctx(), t = ac.currentTime;
  // deep boom
  const o = ac.createOscillator();
  o.type = 'sine';
  o.frequency.setValueAtTime(110, t);
  o.frequency.exponentialRampToValueAtTime(28, t + 0.6);
  const og = ac.createGain();
  og.gain.setValueAtTime(0.9, t);
  og.gain.exponentialRampToValueAtTime(0.001, t + 0.8);
  o.connect(og).connect(ac.destination);
  o.start(t); o.stop(t + 0.9);
  // noise blast
  const dur = 0.7;
  const buf = ac.createBuffer(1, ac.sampleRate * dur, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 2);
  const src = ac.createBufferSource(); src.buffer = buf;
  const f = ac.createBiquadFilter(); f.type = 'lowpass';
  f.frequency.setValueAtTime(3000, t);
  f.frequency.exponentialRampToValueAtTime(200, t + dur);
  const g = ac.createGain();
  g.gain.setValueAtTime(0.7, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  src.connect(f).connect(g).connect(ac.destination);
  src.start(t);
}

// ---------- Sound (Web Audio, synthesized) ----------
let audioCtx = null;
function ctx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function playShoot(power) {
  const ac = ctx(), t = ac.currentTime;
  // whoosh: filtered noise sweep
  const dur = 0.35;
  const buf = ac.createBuffer(1, ac.sampleRate * dur, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
  const src = ac.createBufferSource(); src.buffer = buf;
  const f = ac.createBiquadFilter(); f.type = 'bandpass'; f.Q.value = 1.2;
  f.frequency.setValueAtTime(400, t);
  f.frequency.exponentialRampToValueAtTime(2500, t + dur);
  const g = ac.createGain();
  g.gain.setValueAtTime(0.25 + power * 0.3, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  src.connect(f).connect(g).connect(ac.destination);
  src.start(t);
}
function playClank(impact) {
  const ac = ctx(), t = ac.currentTime;
  const vol = Math.min(impact / 14, 1) * 0.5;
  // metallic: a few inharmonic partials, fast decay
  const base = 180 + Math.random() * 80;
  for (const [ratio, amp] of [[1, 1], [2.76, 0.6], [5.4, 0.35], [8.9, 0.2]]) {
    const o = ac.createOscillator();
    o.type = 'triangle';
    o.frequency.value = base * ratio;
    const g = ac.createGain();
    g.gain.setValueAtTime(vol * amp, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.28 + Math.random() * 0.15);
    o.connect(g).connect(ac.destination);
    o.start(t); o.stop(t + 0.5);
  }
  // impact thud
  const o = ac.createOscillator();
  o.type = 'sine'; o.frequency.setValueAtTime(90, t);
  o.frequency.exponentialRampToValueAtTime(40, t + 0.12);
  const g = ac.createGain();
  g.gain.setValueAtTime(vol * 0.8, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
  o.connect(g).connect(ac.destination);
  o.start(t); o.stop(t + 0.2);
}
function playWoodKnock(impact) {
  const ac = ctx(), t = ac.currentTime;
  const vol = Math.min(impact / 12, 1) * 0.55;
  if (vol < 0.02) return;
  // hollow cask knock: low resonant thump + a couple of quickly-damped woody partials
  const base = 95 + Math.random() * 35;
  for (const [ratio, amp, dec] of [[1, 1, 0.18], [2.15, 0.5, 0.1], [3.4, 0.22, 0.06]]) {
    const o = ac.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(base * ratio, t);
    o.frequency.exponentialRampToValueAtTime(base * ratio * 0.85, t + dec);
    const g = ac.createGain();
    g.gain.setValueAtTime(vol * amp, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dec);
    o.connect(g).connect(ac.destination);
    o.start(t); o.stop(t + dec + 0.05);
  }
  // dry surface click (no metallic ring)
  const dur = 0.05;
  const buf = ac.createBuffer(1, ac.sampleRate * dur, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
  const src = ac.createBufferSource(); src.buffer = buf;
  const f = ac.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 1100;
  const g = ac.createGain();
  g.gain.setValueAtTime(vol * 0.6, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  src.connect(f).connect(g).connect(ac.destination);
  src.start(t);
}
function playBounce(impact) {
  const ac = ctx(), t = ac.currentTime;
  const vol = Math.min(impact / 12, 1) * 0.35;
  if (vol < 0.02) return;
  const o = ac.createOscillator();
  o.type = 'sine';
  o.frequency.setValueAtTime(160, t);
  o.frequency.exponentialRampToValueAtTime(60, t + 0.1);
  const g = ac.createGain();
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.14);
  o.connect(g).connect(ac.destination);
  o.start(t); o.stop(t + 0.2);
}

// ---------- Camera orbit (right-drag) ----------
const orbit = { theta: 0, phi: 0.24, radius: 15.5, target: new THREE.Vector3(0, 2.8, -6) };
let orbiting = false, lastX = 0, lastY = 0;

function updateCamera() {
  const { theta, phi, radius, target } = orbit;
  camera.position.set(
    target.x + radius * Math.sin(theta) * Math.cos(phi),
    target.y + radius * Math.sin(phi),
    target.z + radius * Math.cos(theta) * Math.cos(phi)
  );
  camera.lookAt(target);
}
updateCamera();

canvas.addEventListener('contextmenu', (e) => e.preventDefault());

// ---------- Aiming ----------
const raycaster = new THREE.Raycaster();
const mouseNDC = new THREE.Vector2(0, 0);
let charging = false, chargeStart = 0;
let harpoonLink = null, pulling = false;   // a harpoon stuck in a barrel; hold Space to reel it in
const powerEl = document.getElementById('power');
const powerFill = document.getElementById('powerFill');

function aimDir() {
  raycaster.setFromCamera(mouseNDC, camera);
  return raycaster.ray.direction.clone().normalize();
}

canvas.addEventListener('pointermove', (e) => {
  mouseNDC.x = (e.clientX / innerWidth) * 2 - 1;
  mouseNDC.y = -(e.clientY / innerHeight) * 2 + 1;
  if (orbiting) {
    orbit.theta -= (e.clientX - lastX) * 0.005;
    orbit.phi = Math.min(Math.max(orbit.phi + (e.clientY - lastY) * 0.004, 0.02), 1.35);
    lastX = e.clientX; lastY = e.clientY;
    updateCamera();
  }
});
canvas.addEventListener('pointerdown', (e) => {
  if (e.button === 2) {
    orbiting = true;
    lastX = e.clientX; lastY = e.clientY;
    canvas.setPointerCapture(e.pointerId);
    return;
  }
  if (e.button !== 0) return;
  if (ammoType === 'magneto') { magnetoActive = true; return; }
  charging = true;
  chargeStart = performance.now();
  powerEl.style.opacity = 1;
});
addEventListener('pointerup', (e) => {
  if (e.button === 2) { orbiting = false; return; }
  if (magnetoActive) { magnetoActive = false; return; }
  if (!charging) return;
  charging = false;
  powerEl.style.opacity = 0;
  const t = Math.min((performance.now() - chargeStart) / 400, 1);
  shootBall(aimDir(), t);
});
canvas.addEventListener('wheel', (e) => {
  orbit.radius = Math.min(Math.max(orbit.radius + e.deltaY * 0.01, 5), 30);
  updateCamera();
}, { passive: true });

// ---------- Score / reset ----------
let shots = 0;
const scoreEl = document.getElementById('score');
const ballsEl = document.getElementById('balls');

function updateHud() {
  const down = barrels.filter(b => b.down).length;
  scoreEl.innerHTML = down + '<span style="opacity:0.4">/' + barrels.length + '</span>';
  ballsEl.textContent = 'Shots: ' + shots;
  if (down === barrels.length && !scoreEl.dataset.won) {
    scoreEl.dataset.won = '1';
    scoreEl.style.color = 'oklch(0.8 0.17 145)';
  }
}
updateHud();

function removeProjectile(b) {
  if (b.constraint) {
    world.removeConstraint(b.constraint);
    world.removeBody(b.constraint._anchorBody);
  }
  if (b.chainMesh) { scene.remove(b.chainMesh); }
  world.removeBody(b.body); scene.remove(b.mesh);
}

function reset() {
  detachHarpoon();   // drop any tethered harpoon before rebuilding bodies
  for (const b of balls) removeProjectile(b);
  balls.length = 0;
  for (const h of hurricanes) scene.remove(h.group);
  hurricanes.length = 0;
  buildTargets(); // full rebuild — restores frozen state for cards
  shots = 0;
  delete scoreEl.dataset.won;
  scoreEl.style.color = '';
  updateHud();
}
document.getElementById('reset').addEventListener('click', reset);
addEventListener('keydown', (e) => {
  const k = e.key.toLowerCase();
  if (k === 'r') reset();
  if (k === '1') setAmmo('basketball');
  if (k === '2') setAmmo('cannonball');
  if (k === '3') setAmmo('bomb');
  if (k === '4') setAmmo('tennisball');
  if (k === '5') setAmmo('bowlingball');
  if (k === '6') setAmmo('spear');
  if (k === '7') setAmmo('wrecking');
  if (k === '8') setAmmo('catapult');
  if (k === '9') setAmmo('slingshot');
  if (k === '0') setAmmo('f16');
  if (k === 'p') setAmmo('paintball');
  if (k === 'l') setAmmo('lightning');
  if (k === 'u') setAmmo('hurricane');
  if (k === 'm') setAmmo('magneto');
  if (k === 'g') setAmmo('grenade');
  if (k === 's') setAmmo('soccerball');
  if (k === 'h') setAmmo('hammer');
  if (k === 'e') setAmmo('medball');
  if (k === 'd') setAmmo('dynamite');
  if (k === 'a') setAmmo('anchor');
  if (k === 'c') setAmmo('crt');
  if (k === 'j') setAmmo('harpoon');
  if (k === 'x') setAmmo('laser');
  if (k === 'v') setAmmo('disruptor');
  if (k === 'q') setAmmo('sniper');
  if (e.key === ' ' && harpoonLink) { pulling = true; e.preventDefault(); }  // hold Space = elephant pull
  if (e.key === 'Shift' && !quakeActive) { quakeActive = true; quakeStart = performance.now(); }
});
addEventListener('keyup', (e) => {
  if (e.key === ' ') pulling = false;
  if (e.key === 'Shift') quakeActive = false;
});

// ---------- Loop ----------
const clock = new THREE.Clock();
const up = new CANNON.Vec3(0, 1, 0);
const bodyUp = new CANNON.Vec3();
let shake = 0;
let magnetoActive = false;
let quakeActive = false, quakeStart = 0;

function resize() {
  const w = innerWidth, h = innerHeight;
  if (canvas.width !== w * renderer.getPixelRatio() || canvas.height !== h * renderer.getPixelRatio()) {
    renderer.setSize(w, h, false);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }
}

let lastCollapseCheck = 0;
function animate() {
  requestAnimationFrame(animate);
  resize();
  const dt = Math.min(clock.getDelta(), 1 / 30);
  const now = performance.now();
  world.step(1 / 240, dt, 10); // small fixed step so fast projectiles don't tunnel through

  // Harpoon tether: keep the rope drawn, and reel the barrel in while the player pulls.
  if (harpoonLink) {
    const rec = harpoonLink.rec, b = harpoonLink.barrel;
    // rope starts at a launcher point low-right in view — from the camera itself it's edge-on and invisible
    const from = new THREE.Vector3(0.6, -0.55, -1.4).applyMatrix4(camera.matrixWorld);
    const to = new THREE.Vector3(rec.body.position.x, rec.body.position.y, rec.body.position.z);
    const seg = to.clone().sub(from);
    const dist3 = seg.length();
    harpoonLink.rope.position.copy(from).add(to).multiplyScalar(0.5);
    if (dist3 > 1e-6) {
      harpoonLink.rope.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), seg.clone().normalize());
    }
    harpoonLink.rope.scale.set(1, dist3, 1);
    harpoonLink.rope.material.map.repeat.set(1, Math.max(1, Math.round(dist3 * 2)));  // braid stays fine-grained, doesn't stretch
    if (b.position.y < -5) { detachHarpoon(); }        // barrel fell off the world
    else if (pulling) {
      const d = new CANNON.Vec3(from.x - b.position.x, from.y - b.position.y, from.z - b.position.z);
      const dist = d.length(); d.normalize();
      b.wakeUp(); rec.body.wakeUp();
      const F = 220 * b.mass;                           // elephant-grade pull
      b.applyForce(new CANNON.Vec3(d.x * F, d.y * F + 9.82 * b.mass, d.z * F), b.position);
      b.velocity.scale(0.92, b.velocity);
      if (dist < 4) detachHarpoon();                    // reeled in close → let go
    }
  }

  // after any disturbance, drop blocks that lost their support (~every 120ms)
  if (now - lastCollapseCheck > 120) { lastCollapseCheck = now; collapseUnsupported(); }

  // charge bar
  if (charging) {
    const t = Math.min((performance.now() - chargeStart) / 400, 1);
    powerFill.style.width = (t * 100) + '%';
  }

  // sync barrels + detect knocked-over
  let changed = false;
  for (const b of barrels) {
    b.mesh.position.copy(b.body.position);
    b.mesh.quaternion.copy(b.body.quaternion);
    if (!b.down) {
      // deviation from home orientation, or displaced from home spot
      const qd = Math.abs(
        b.body.quaternion.x * b.homeQ.x + b.body.quaternion.y * b.homeQ.y +
        b.body.quaternion.z * b.homeQ.z + b.body.quaternion.w * b.homeQ.w
      );
      const moved = b.body.position.vsub(b.home).length() > 0.45;
      if (qd < 0.93 || moved) { b.down = true; changed = true; }
    }
  }
  if (changed) updateHud();

  // Magneto: while held, lift every piece and gather it toward the aim point ("led by thoughts")
  if (magnetoActive) {
    raycaster.setFromCamera(mouseNDC, camera);
    const r = raycaster.ray;
    const dist = Math.max((orbit.target.z - r.origin.z) / (r.direction.z || -1), 6);
    const tp = r.origin.clone().add(r.direction.clone().multiplyScalar(Math.min(dist, 40)));
    const target = new CANNON.Vec3(tp.x, Math.max(tp.y, 2), tp.z);
    for (const b of barrels) {
      if (b.body.type === CANNON.Body.STATIC) {
        b.body.type = CANNON.Body.DYNAMIC;
        b.body.mass = b.body._mass || 0.3;
        b.body.updateMassProperties();
      }
      b.body.wakeUp();
      const toP = target.vsub(b.body.position);
      const d = Math.max(toP.length(), 0.3); toP.normalize();
      const F = Math.min(d, 6) * 16;
      const m = b.body.mass || 1;
      b.body.applyForce(new CANNON.Vec3(toP.x * F * m, toP.y * F * m + 9.82 * m, toP.z * F * m), b.body.position);
      b.body.velocity.scale(0.9, b.body.velocity);
    }
  }

  // Earthquake while Shift held: rattle every piece; intensity builds toward the middle of the shake
  if (quakeActive) {
    const el = (now - quakeStart) / 1000;
    const intensity = Math.min(el / 1.2, 1);
    for (const b of barrels) {
      if (b.body.type === CANNON.Body.STATIC) {
        b.body.type = CANNON.Body.DYNAMIC;
        b.body.mass = b.body._mass || 0.3;
        b.body.updateMassProperties();
      }
      b.body.wakeUp();
      const m = b.body.mass || 1;
      const q = 26 * intensity * m;
      b.body.applyForce(new CANNON.Vec3((Math.random() - 0.5) * q, (Math.random() - 0.2) * q * 0.5, (Math.random() - 0.5) * q), b.body.position);
    }
    shake = Math.max(shake, 0.18 * intensity);
  }

  // hurricanes: swirl, lift, and drag pieces around a wandering funnel
  for (let i = hurricanes.length - 1; i >= 0; i--) {
    const h = hurricanes[i];
    const age = (now - h.born) / 1000, life = h.dur / 1000;
    if (age > life) { scene.remove(h.group); hurricanes.splice(i, 1); continue; }
    const S = TSCALE, R = 4.5 * S, HH = 11 * S;
    // wander, but stay near where it touched down
    const gp = h.group.position;
    const away = new THREE.Vector2(gp.x - h.home.x, gp.z - h.home.y);
    if (away.length() > 6 * S) h.vel.copy(away.normalize().multiplyScalar(-1.4 * S));
    gp.x += h.vel.x * dt; gp.z += h.vel.y * dt;
    h.group.rotation.y -= 9 * dt;
    h.inner.rotation.y += 6 * dt;
    const fade = age < 0.5 ? age / 0.5 : age > life - 1 ? Math.max(life - age, 0) : 1;
    h.outer.material.opacity = 0.2 * fade;
    h.inner.material.opacity = 0.28 * fade;
    h.dust.material.opacity = 0.16 * fade;
    // unfreeze frozen pieces the funnel reaches
    for (const b of barrels) {
      if (b.body.type !== CANNON.Body.STATIC) continue;
      if (Math.hypot(b.body.position.x - gp.x, b.body.position.z - gp.z) > R * 0.8) continue;
      if (b.body.position.y > HH) continue;
      b.body.type = CANNON.Body.DYNAMIC;
      b.body.mass = b.body._mass || 0.3;
      b.body.updateMassProperties();
      b.body.wakeUp();
    }
    // swirl every dynamic body in reach
    for (const body of world.bodies) {
      if (body.mass <= 0 || body.type === CANNON.Body.STATIC) continue;
      const dx = body.position.x - gp.x, dz = body.position.z - gp.z;
      const d2 = Math.hypot(dx, dz);
      if (d2 > R || body.position.y > HH) continue;
      body.wakeUp();
      const f = (1 - d2 / R) * fade;
      const inv = d2 > 0.001 ? 1 / d2 : 0;
      const rx = dx * inv, rz = dz * inv;   // radial out
      const tx = -rz, tz = rx;              // tangential
      const sw = 40 * f, pull = 15 * f, lift = (24 + Math.random() * 10) * f;
      const m = body.mass;
      body.applyImpulse(new CANNON.Vec3(
        (tx * sw - rx * pull) * m * dt,
        lift * m * dt,
        (tz * sw - rz * pull) * m * dt
      ), body.position);
    }
  }

  // lightning bolts fade out
  for (let i = bolts.length - 1; i >= 0; i--) {
    const bo = bolts[i];
    const age = (now - bo.born) / 350;
    if (age >= 1) {
      scene.remove(bo.line); scene.remove(bo.light);
      bo.line.geometry.dispose();
      bolts.splice(i, 1);
      continue;
    }
    bo.line.material.opacity = 1 - age;
    bo.light.intensity = 9 * (1 - age);
  }

  // sync balls, cull old ones
  for (let i = balls.length - 1; i >= 0; i--) {
    const b = balls[i];
    // grenade cooks off after a short fuse
    if (b.type === 'grenade' && !b.exploded && now - b.born > 1500) { explode(b); continue; }
    // spear flies point-first until it hits something
    if ((b.type === 'spear' || b.type === 'f16') && !b.hit && b.body.velocity.lengthSquared() > 4) {
      const v = b.body.velocity.clone(); v.normalize();
      b.body.quaternion.setFromVectors(new CANNON.Vec3(0, 1, 0), v);
      b.body.angularVelocity.setZero();
    }
    b.mesh.position.copy(b.body.position);
    b.mesh.quaternion.copy(b.body.quaternion);
    // stretch chain between anchor and wrecking ball
    if (b.chainMesh) {
      const a = b.anchorPos, p = b.body.position;
      const mid = new THREE.Vector3((a.x + p.x) / 2, (a.y + p.y) / 2, (a.z + p.z) / 2);
      const dir3 = new THREE.Vector3(p.x - a.x, p.y - a.y, p.z - a.z);
      const len = dir3.length();
      b.chainMesh.position.copy(mid);
      b.chainMesh.scale.set(1, len, 1);
      b.chainMesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir3.normalize());
    }
    const cullTime = b.type === 'wrecking' ? 25000 : 12000;
    if (!b.stuck && (now - b.born > cullTime || b.body.position.y < -5)) {
      removeProjectile(b);
      balls.splice(i, 1);
    }
  }

  // explosion visuals
  for (let i = explosions.length - 1; i >= 0; i--) {
    const ex = explosions[i];
    const age = (now - ex.born) / 1000;
    if (age > 1.1) {
      scene.remove(ex.flash); scene.remove(ex.pts);
      ex.flash.geometry.dispose(); ex.pts.geometry.dispose();
      explosions.splice(i, 1);
      continue;
    }
    ex.flash.scale.setScalar(1 + age * 9);
    ex.flash.material.opacity = Math.max(0.95 - age * 2.2, 0);
    const pos = ex.pts.geometry.attributes.position;
    for (let j = 0; j < ex.vel.length; j++) {
      ex.vel[j].y -= 9.82 * dt;
      pos.array[j * 3] += ex.vel[j].x * dt;
      pos.array[j * 3 + 1] += ex.vel[j].y * dt;
      pos.array[j * 3 + 2] += ex.vel[j].z * dt;
    }
    pos.needsUpdate = true;
    ex.pts.material.opacity = Math.max(1 - age, 0);
  }

  // camera shake
  if (shake > 0.001) {
    updateCamera();
    camera.position.x += (Math.random() - 0.5) * shake;
    camera.position.y += (Math.random() - 0.5) * shake;
    shake *= Math.pow(0.001, dt);
  }

  renderer.render(scene, camera);
}
animate();
